allowBuilds:
  "@parcel/watcher": false
  esbuild: false
  svelte-preprocess: true
  unrs-resolver: false

engineStrict: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - devalue
  - svelte
  - "@sveltejs/*"
  - "@sveltia/*"
  - lexical
  - "@lexical/*"

overrides:
  "cookie@<0.7.0": ">=0.7.0"
